<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi Proyecto</title>
  <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css](https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css)">
  <style>
    body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
  </style>
</head>
<body class="markdown-body">
  
  {{ content }}

  <script type="module">
    import mermaid from '[https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs](https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs)';
    
    const blocks = document.querySelectorAll('.language-mermaid code, code.language-mermaid, pre > code.language-mermaid');
    
    blocks.forEach((block) => {
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = block.textContent;
      
      const parent = block.closest('.highlighter-rouge') || block.closest('pre') || block;
      parent.replaceWith(div);
    });
    
    mermaid.initialize({ startOnLoad: true });
  </script>
</body>
</html>
